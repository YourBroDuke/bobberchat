apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bobberchat.fullname" . }}-config
  labels:
    {{- include "bobberchat.labels" . | nindent 4 }}
data:
  backend.yaml: |
    server:
      listen_address: {{ .Values.config.listenAddress | quote }}
    postgres:
      dsn: ""
    auth:
      jwt_secret: ""
    rate_limits:
      per_agent: {{ .Values.config.rateLimits.perAgent }}
      per_group: {{ .Values.config.rateLimits.perGroup }}
      per_tag: {{ .Values.config.rateLimits.perTag }}
      burst_factor: {{ .Values.config.rateLimits.burstFactor }}
