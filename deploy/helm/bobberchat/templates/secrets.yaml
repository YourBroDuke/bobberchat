apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bobberchat.fullname" . }}-secrets
  labels:
    {{- include "bobberchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-dsn: {{ .Values.secrets.postgresDsn | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bobberchat.fullname" . }}-db-credentials
  labels:
    {{- include "bobberchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.secrets.postgresPassword | quote }}
{{- end }}
