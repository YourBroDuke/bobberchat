{{- if .Values.migration.enabled }}
{{- if .Values.migration.sql }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bobberchat.fullname" . }}-migrations
  labels:
    {{- include "bobberchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  001_initial_schema.sql: |
    {{- .Values.migration.sql | nindent 4 }}
---
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bobberchat.fullname" . }}-migrate
  labels:
    {{- include "bobberchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          command: ["sh", "-c", "until pg_isready -h {{ include "bobberchat.fullname" . }}-postgres -U bobberchat; do sleep 2; done"]
      containers:
        - name: migrate
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bobberchat.fullname" . }}-db-credentials
                  key: password
          command:
            - psql
            - -h
            - {{ include "bobberchat.fullname" . }}-postgres
            - -U
            - bobberchat
            - -d
            - bobberchat
            - -f
            - /migrations/001_initial_schema.sql
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ include "bobberchat.fullname" . }}-migrations
{{- end }}
