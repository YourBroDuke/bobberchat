apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: bobberchat
  labels:
    app.kubernetes.io/name: bobberchat
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bobberchat
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10
          args: ["-js", "-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitoring
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitoring
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitoring
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: bobberchat
  labels:
    app.kubernetes.io/name: bobberchat
    app.kubernetes.io/component: nats
spec:
  selector:
    app.kubernetes.io/component: nats
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitoring
      port: 8222
      targetPort: monitoring
