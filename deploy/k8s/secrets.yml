apiVersion: v1
kind: Secret
metadata:
  name: bobberchat-secrets
  namespace: bobberchat
  labels:
    app.kubernetes.io/name: bobberchat
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # IMPORTANT: Replace these with real values before deploying.
  # Consider using external-secrets-operator or sealed-secrets in production.
  postgres-dsn: "postgres://bobberchat:CHANGE_ME@postgres.bobberchat.svc.cluster.local:5432/bobberchat?sslmode=require"
  jwt-secret: "CHANGE_ME_TO_A_RANDOM_SECRET"
