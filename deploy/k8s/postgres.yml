apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: bobberchat
  labels:
    app.kubernetes.io/name: bobberchat
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bobberchat
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_USER
              value: bobberchat
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bobberchat-db-credentials
                  key: password
            - name: POSTGRES_DB
              value: bobberchat
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bobberchat"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bobberchat"]
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: bobberchat
  labels:
    app.kubernetes.io/name: bobberchat
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: bobberchat-db-credentials
  namespace: bobberchat
  labels:
    app.kubernetes.io/name: bobberchat
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  # IMPORTANT: Replace with a strong password before deploying
  password: "CHANGE_ME"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bobberchat
  labels:
    app.kubernetes.io/name: bobberchat
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
