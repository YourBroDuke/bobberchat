name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [master, main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-bobberchat-staging
          cluster-name: aks-bobberchat-staging

      - name: Deploy with Helm
        run: |
          helm upgrade --install bobberchat deploy/helm/bobberchat/ \
            -f deploy/helm/values-azure-staging.yaml \
            --set image.repository=ghcr.io/yourbroduke/bobberchat \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set postgres.external.host=${{ secrets.STAGING_POSTGRES_HOST }} \
            --set postgres.external.password=${{ secrets.STAGING_POSTGRES_PASSWORD }} \
            --set secrets.postgresPassword=${{ secrets.STAGING_POSTGRES_PASSWORD }} \
            --set secrets.postgresDsn=${{ secrets.STAGING_POSTGRES_DSN }} \
            --set secrets.jwtSecret=${{ secrets.STAGING_JWT_SECRET }} \
            --set-file migration.sql=migrations/001_initial_schema.sql

      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl -sfk https://staging.bobbers.cc/v1/health || (echo "Health check failed" && exit 1)
