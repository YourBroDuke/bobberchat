name: Deploy to AKS

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          POSTGRES_DSN="${{ secrets.POSTGRES_DSN_STAGING }}"
          POSTGRES_HOST=$(echo "$POSTGRES_DSN" | sed -n 's/.*@\([^:]*\):.*/\1/p')
          POSTGRES_PASSWORD=$(echo "$POSTGRES_DSN" | sed -n 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1/p')
          
          helm upgrade --install bobberchat deploy/helm/bobberchat/ \
            -f deploy/helm/values-azure-staging.yaml \
            --set image.repository=ghcr.io/yourbroduke/bobberchat \
            --set image.tag=${{ github.event.workflow_run.head_branch || github.ref_name }} \
            --set postgres.external.host="$POSTGRES_HOST" \
            --set postgres.external.password="$POSTGRES_PASSWORD" \
            --set secrets.postgresDsn=${{ secrets.POSTGRES_DSN_STAGING }} \
            --set secrets.jwtSecret=${{ secrets.JWT_SECRET_STAGING }} \
            --set-file migration.sql=migrations/001_initial_schema.sql

      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl -sf https://staging.bobbers.cc/v1/health || (echo "Health check failed" && exit 1)

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-staging]
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && needs.deploy-staging.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-bobberchat-production
          cluster-name: aks-bobberchat-production

      - name: Deploy with Helm
        run: |
          helm upgrade --install bobberchat deploy/helm/bobberchat/ \
            -f deploy/helm/values-azure-production.yaml \
            --set image.tag=${{ github.event.workflow_run.head_branch || github.ref_name }} \
            --set postgres.external.host=${{ secrets.PRODUCTION_POSTGRES_HOST }} \
            --set postgres.external.password=${{ secrets.PRODUCTION_POSTGRES_PASSWORD }} \
            --set secrets.postgresDsn=${{ secrets.PRODUCTION_POSTGRES_DSN }} \
            --set secrets.jwtSecret=${{ secrets.PRODUCTION_JWT_SECRET }} \
            --set-file migration.sql=migrations/001_initial_schema.sql

      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl -sf https://api.bobbers.cc/v1/health || (echo "Health check failed" && exit 1)
