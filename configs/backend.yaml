server:
  listen_address: ":8080"
  read_timeout_seconds: 15
  write_timeout_seconds: 15

nats:
  url: "nats://localhost:4222"
  jetstream_domain: ""
  stream_replicas: 3

postgres:
  dsn: "postgres://bobberchat:bobberchat@localhost:5432/bobberchat?sslmode=disable"
  max_open_conns: 50
  max_idle_conns: 10

auth:
  jwt_secret: "change-me"
  jwt_access_ttl_seconds: 3600
  api_secret_hash_algorithm: "argon2id"

email:
  provider: "console"
  from_address: ""
  azure:
    connection_string: ""  # Set via BOBBERD_EMAIL_AZURE_CONNECTION_STRING env var
  verification_token_ttl_hours: 24

rate_limits:
  enabled: true
  per_agent_mps: 100
  per_group_mps: 500
  per_tag_mps: 50
  burst_factor: 10
  cleanup_seconds: 300

logging:
  level: "info"
  format: "json"

observability:
  metrics_path: "/v1/metrics"
  otlp_endpoint: "http://localhost:4317"
